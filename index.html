<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Subway calculator</title>

<link rel="icon" href="favicon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Subway Calc">
<link rel="apple-touch-icon" href="favicon.png">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --subway-green: #006C35;
  --subway-green-light: #00843D;
  --accent-purple: #6a0dad;
  --hover-bg: #f2f2f7;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", system-ui, sans-serif;
  background: #f2f2f7;
  margin: 0;
  padding: 20px;
  color: #000;
  padding-bottom: 140px;
  -webkit-overflow-scrolling: touch;
  touch-action: manipulation;
  overscroll-behavior-y: contain;
  padding-top: 120px;
}

.logo {
  font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, system-ui;
  font-size: 38px;
  font-weight: 800;
  letter-spacing: 0.5px;
  margin-bottom: 24px;
  display: flex;
  align-items: baseline;
  -webkit-font-smoothing: antialiased;
}

.logo .sub {
  color: #FFC20E;
  letter-spacing: -1px;
}

.logo .way {
  color: #00843D;
  letter-spacing: -1px;
}

.logo .title-sub {
  font-size: 18px;
  color: #6e6e73;
  letter-spacing: 0;
  font-weight: 500;
  margin-left: 10px;
  transform: translateY(-1px);
}

.card {
  background: #ffffff;
  border-radius: 20px;
  padding: 20px 18px;
  margin-bottom: 20px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.06);
  border: 1px solid #eee;
  position: relative;
  z-index: 1;
  transition: 0.15s ease;
  cursor: pointer;
  will-change: transform;
}
.card:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}
.card:active {
  transform: scale(0.98);
}

label {
  font-size: 17px;
  font-weight: 600;
  margin-bottom: 6px;
  color: #1c1c1e;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

select {
  width: 100%;
  margin-top: 12px;
  padding: 14px;
  border-radius: 14px;
  border: 1px solid #e5e5ea;
  background: #f9f9f9;
  color: #000;
  font-size: 17px;
  line-height: 1.4;
  min-height: 48px;
  appearance: none;
  -webkit-appearance: none;
  position: relative;
  z-index: 1;
  font-weight: 400;
  transition: all 0.15s ease;
  cursor: pointer;
  transform-origin: center;
  -webkit-tap-highlight-color: transparent;
}
select option {
  font-size: 17px;
}
select {
  background-image: url("data:image/svg+xml;utf8,<svg fill='%238e8e93' height='20' viewBox='0 0 20 20' width='20' xmlns='http://www.w3.org/2000/svg'><path d='M5 7l5 5 5-5z'/></svg>");
  background-repeat: no-repeat;
  background-position: right 12px center;
  background-size: 16px;
}

select:hover {
  background-color: #fff;
  border-color: var(--accent-purple);
}
select:active {
  transform: scale(0.98);
  background: #fff;
}

button:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  filter: brightness(1.05);
}
button:active {
  transform: scale(0.96);
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  filter: brightness(0.95);
}

select:focus {
  outline: none;
  border-color: #34c759;
  box-shadow: 0 0 0 3px rgba(52,199,89,0.15);
}

select:focus-visible {
  box-shadow: 0 0 0 2px rgba(52,199,89,0.25);
}


.result {
  position: fixed;
  top: 20px;
  left: 20px;
  right: 20px;
  z-index: 999;
  background: #ffffff;
  padding: 18px;
  border-radius: 24px;
  font-size: 18px;
  font-weight: 600;
  box-shadow: 0 -6px 20px rgba(0,0,0,0.12);
  color: #000;
  border: 1px solid #eee;
  backdrop-filter: blur(10px);
  transition: box-shadow 0.2s ease;
  overflow: hidden;
  margin-bottom: 10px;
  padding-bottom: calc(18px + env(safe-area-inset-bottom));
  margin-top: 20px;
}
button {
  -webkit-tap-highlight-color: transparent;
}

button:active {
  transition: none;
}
.result::before {
  content: "";
  position: absolute;
  top: -20px;
  left: 0;
  right: 0;
  height: 20px;
  background: linear-gradient(to top, white, transparent);
}

.result.update {
  transform: none;
}

.result strong {
  font-size: 20px;
  color: var(--subway-green-light);
}
/* iOS style switch */
input[type="checkbox"] {
  appearance: none;
  -webkit-appearance: none;
  width: 44px;
  height: 26px;
  background: #e5e5ea;
  border-radius: 999px;
  position: relative;
  outline: none;
  cursor: pointer;
  transition: background 0.2s ease;
}

input[type="checkbox"]::after {
  content: "";
  position: absolute;
  width: 22px;
  height: 22px;
  background: #fff;
  border-radius: 50%;
  top: 2px;
  left: 2px;
  transition: transform 0.2s ease;
  box-shadow: 0 1px 2px rgba(0,0,0,0.2);
}

input[type="checkbox"]:checked {
  background: #34c759;
}

input[type="checkbox"]:checked::after {
  transform: translateX(18px);
}

input[type="checkbox"]:active::after {
  transform: scale(1.05);
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
#addonList select {
  animation: fadeIn 0.2s ease;
}

#sauce2Container {
  opacity: 0;
  transform: translateY(-4px);
  transition: all 0.2s ease;
}
#sauce2Container.show {
  opacity: 1;
  transform: translateY(0);
}

/* Swipe hint styles */
#swipeHint {
  opacity: 0;
  transition: opacity 0.3s ease;
}

#addonList:not(:empty) ~ #addonEmpty #swipeHint,
#swipeHint.show {
  opacity: 1;
}

@media (hover: none) {
  .card:hover,
  button:hover {
    transform: none;
    box-shadow: none;
    filter: none;
  }
}
</style>
</head>

function createAddonSelect(removable = true){
  const wrapper = document.createElement("div")
  // Touch swipe-to-remove for mobile
  let startX = 0;
  let currentX = 0;
  let isSwiping = false;

  wrapper.addEventListener("touchstart", (e) => {
    startX = e.touches[0].clientX;
    isSwiping = false;
  });

  wrapper.addEventListener("touchmove", (e) => {
    currentX = e.touches[0].clientX;
    const diff = currentX - startX;

    // activate swipe only after threshold (prevents scroll conflict)
    if (!isSwiping && Math.abs(diff) > 10) {
      isSwiping = true;
    }

    if (!isSwiping) return;

    e.preventDefault(); // lock vertical scroll when swiping

    if (diff < 0) {
      wrapper.style.transform = `translateX(${diff}px)`;
      wrapper.style.opacity = Math.max(0.5, 1 + diff / 200);
    }
  });

  wrapper.addEventListener("touchend", (e) => {
    const diff = currentX - startX;

    if (!isSwiping) {
      startX = 0;
      currentX = 0;
      return;
    }

    if (diff < -80) {
      wrapper.style.transition = "all 0.2s ease";
      wrapper.style.transform = "translateX(-120%)";
      wrapper.style.opacity = "0";

      setTimeout(() => {
        wrapper.remove();
        updateAddonUI();
        calc();
      }, 200);
    } else {
      wrapper.style.transition = "all 0.2s ease";
      wrapper.style.transform = "translateX(0)";
      wrapper.style.opacity = "1";
    }

    isSwiping = false;
    startX = 0;
    currentX = 0;
  });

  wrapper.style.display = "flex"
  wrapper.style.alignItems = "center"
  wrapper.style.gap = "8px"
  wrapper.style.marginTop = "8px"

  const select = document.createElement("select")
  // prevent card click from immediately closing select
  select.addEventListener("click", (e) => {
    e.stopPropagation();
  });
  select.addEventListener("touchstart", (e) => {
    e.stopPropagation();
  });
  select.onchange = () => {
    calc()
  }
  select.style.flex = "1"

  select.innerHTML = '<option value="">選擇加料</option>'

  Object.keys(data.addon).forEach(i=>{
    let en = addonNameMap[i] || ""
    const label = en ? `${i} ${en}` : i;
    select.innerHTML += `<option value="${i}">${label}</option>`;
  })

  wrapper.appendChild(select)

  if(removable){
    const removeBtn = document.createElement("button")
    removeBtn.textContent = "−"
    removeBtn.style.border = "none"
    removeBtn.style.background = "#e5e5ea"
    removeBtn.style.borderRadius = "50%"
    removeBtn.style.width = "28px"
    removeBtn.style.height = "28px"
    removeBtn.style.display = "flex"
    removeBtn.style.alignItems = "center"
    removeBtn.style.justifyContent = "center"
    removeBtn.style.fontSize = "18px"
    removeBtn.style.cursor = "pointer"
    removeBtn.style.color = "#1c1c1e"
    removeBtn.style.transition = "all 0.15s ease"
    removeBtn.style.opacity = "0.6"

    removeBtn.onclick = (e) => {
      e.stopPropagation();
      wrapper.remove()
      updateAddonUI()
      calc()
    }

    wrapper.appendChild(removeBtn)
  }

  return wrapper
}

function addAddon(defaultValue = ""){
  haptic();
  const container = document.getElementById("addonList")

  const isFirst = document.querySelectorAll("#addonList select").length === 0
  const wrapper = createAddonSelect(!isFirst)

  if (defaultValue) {
    wrapper.querySelector("select").value = defaultValue;
  }

  container.appendChild(wrapper)
  wrapper.querySelector("select").focus()
  updateAddonUI();
}

function updateAddonUI(){
  const count = document.querySelectorAll("#addonList select").length
  const label = document.getElementById("addonLabel")
  const empty = document.getElementById("addonEmpty")
  label.textContent = `Add-ons (${count})`
  empty.style.display = count ? "none" : "block"

  // show swipe hint only when there are add-ons
  const hint = document.getElementById("swipeHint")
  if (hint) {
    hint.style.display = count ? "block" : "none"
  }
}

function toggleSauce2(cb){
  const container = document.getElementById("sauce2Container")
  const select = document.getElementById("sauce2")

  if(cb.checked){
    container.style.display = "block"
    container.classList.add("show")

    // auto open second sauce select
    setTimeout(() => {
      // try native picker first (modern browsers)
      if (select.showPicker) {
        select.showPicker();
      } else {
        // fallback for iOS Safari
        select.focus();
        setTimeout(() => {
          select.dispatchEvent(new MouseEvent("mousedown", { bubbles: true }));
        }, 30);
      }
    }, 100);

  } else {
    container.classList.remove("show")
    setTimeout(()=>{ container.style.display = "none" },200)
    select.value = ""
  }

  calc()
}

let lastCal = 0;
let lastProtein = 0;

function animateNumber(el, start, end, decimals=1, duration=300) {
  let startTime = null;
  function step(timestamp) {
    if (!startTime) startTime = timestamp;
    const progress = Math.min((timestamp - startTime) / duration, 1);
    const value = start + (end - start) * progress;
    el.textContent = value.toFixed(decimals);
    if (progress < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function calc(){
let total = {cal:0, protein:0}

let main = document.getElementById("main").value

if(main && data.main[main]){
  total.cal += data.main[main].cal
  total.protein += data.main[main].protein
}

if(document.getElementById("double").checked && main){
if(data.addon[main]){
total.cal += data.addon[main].cal
total.protein += data.addon[main].protein
}
}

const addonSelects = document.querySelectorAll("#addonList select")

addonSelects.forEach(sel=>{
  let name = sel.value
  if(name && data.addon[name]){
    total.cal += data.addon[name].cal
    total.protein += data.addon[name].protein
  }
})

let sauce1 = document.getElementById("sauce1").value
let sauce2Enabled = document.getElementById("sauce2Toggle").checked
let sauce2 = document.getElementById("sauce2").value

if(sauce1){
  total.cal += data.sauce[sauce1].cal / (sauce2Enabled ? 2 : 1)
}
if(sauce2Enabled && sauce2){
  total.cal += data.sauce[sauce2].cal / 2
}

const resultEl = document.getElementById("result")

resultEl.innerHTML =
`<div style="font-size:20px;color:#1c1c1e;font-weight:600;">🔥 <span id="calVal">0.0</span> kcal</div>
<div style="font-size:26px;color:#34c759;font-weight:700;margin-top:6px;"><span id="proVal">0</span> g protein</div>`

const calEl = document.getElementById("calVal")
const proEl = document.getElementById("proVal")

const calDecimals = (Math.round(total.cal * 10) % 10 === 0) ? 0 : 1
animateNumber(calEl, lastCal, total.cal, calDecimals)
animateNumber(proEl, lastProtein, total.protein, 0)

lastCal = total.cal
lastProtein = total.protein

resultEl.classList.remove("update")
void resultEl.offsetWidth
resultEl.classList.add("update")
if (navigator.vibrate) navigator.vibrate(5);
resultEl.style.visibility = "visible"
}

init()


let lastScroll = 0

window.addEventListener("scroll", () => {
  const logo = document.querySelector(".logo")
  const y = window.scrollY

  if(y > 20){
    logo.style.transform = "scale(0.95)"
    logo.style.opacity = "0.9"
  } else {
    logo.style.transform = "scale(1)"
    logo.style.opacity = "1"
  }

  lastScroll = y
})

let pressTimer
const resultBox = document.getElementById("result")
resultBox.addEventListener("touchstart", () => {
  pressTimer = setTimeout(()=>{
    document.querySelectorAll("#addonList > div").forEach((el,i)=>{
      if(i!==0) el.remove()
    })
    document.getElementById("sauce2Toggle").checked = false
    toggleSauce2({checked:false})
    calc()
  },600)
})
resultBox.addEventListener("touchend", ()=> clearTimeout(pressTimer))

</script>
