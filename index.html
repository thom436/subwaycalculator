<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Subway calculator</title>

<link rel="icon" href="favicon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Subway Calc">
<link rel="apple-touch-icon" href="favicon.png">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --subway-green-light: #00843D;
  --accent-purple: #6a0dad;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", system-ui, sans-serif;
  background: #f2f2f7;
  margin: 0;
  padding: 20px;
  color: #000;
  padding-bottom: calc(180px + env(safe-area-inset-bottom));
  -webkit-overflow-scrolling: touch;
  touch-action: manipulation;
  overscroll-behavior-y: contain;
}

.logo {
  font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, system-ui;
  font-size: 38px;
  font-weight: 800;
  letter-spacing: 0.5px;
  margin-bottom: 24px;
  display: flex;
  align-items: baseline;
  -webkit-font-smoothing: antialiased;
}

.logo .sub {
  color: #FFC20E;
  letter-spacing: -1px;
}

.logo .way {
  color: #00843D;
  letter-spacing: -1px;
}

.logo .title-sub {
  font-size: 18px;
  color: #6e6e73;
  letter-spacing: 0;
  font-weight: 500;
  margin-left: 10px;
  transform: translateY(-1px);
}

.card {
  background: #ffffff;
  border-radius: 20px;
  padding: 20px 18px;
  margin-bottom: 20px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.06);
  border: 1px solid #eee;
  position: relative;
  z-index: 0;
  transition: 0.15s ease;
}

label {
  font-size: 17px;
  font-weight: 600;
  margin-bottom: 6px;
  color: #1c1c1e;
  display: flex;
  align-items: center;
}

select {
  width: 100%;
  margin-top: 12px;
  padding: 14px;
  border-radius: 14px;
  border: 1px solid #e5e5ea;
  background: #f9f9f9;
  color: #000;
  font-size: 17px;
  line-height: 1.4;
  min-height: 48px;
  appearance: none;
  -webkit-appearance: none;
  position: relative;
  z-index: 1;
  font-weight: 400;
  transition: all 0.15s ease;
  cursor: pointer;
  transform-origin: center;
  -webkit-tap-highlight-color: transparent;
  background-image: url("data:image/svg+xml;utf8,<svg fill='%238e8e93' height='20' viewBox='0 0 20 20' width='20' xmlns='http://www.w3.org/2000/svg'><path d='M5 7l5 5 5-5z'/></svg>");
  background-repeat: no-repeat;
  background-position: right 12px center;
  background-size: 16px;
}
select option {
  font-size: 17px;
}

select:hover {
  background-color: #fff;
  border-color: #d1d1d6;
}
select:active {
  background: #fff;
}

button:hover {
  filter: brightness(1.05);
}
button:active {
  filter: brightness(0.95);
}

select:focus {
  outline: none;
  border-color: #34c759;
  box-shadow: 0 0 0 2px rgba(52,199,89,0.2);
}

select:focus-visible {
  box-shadow: 0 0 0 2px rgba(52,199,89,0.2);
}


.result {
  position: fixed;
  bottom: 20px;
  left: 20px;
  right: 20px;
  z-index: 9999;
  background: #ffffff;
  padding: 18px;
  border-radius: 24px;
  font-size: 18px;
  font-weight: 600;
  box-shadow: 0 -6px 20px rgba(0,0,0,0.12);
  color: #000;
  border: 1px solid #eee;
  backdrop-filter: blur(10px);
  transition: box-shadow 0.2s ease;
  overflow: hidden;
  margin-bottom: 10px;
  padding-bottom: calc(18px + env(safe-area-inset-bottom));
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease, box-shadow 0.2s ease;
}

.result.active {
  transform: none;
  opacity: 1;
}
button {
  -webkit-tap-highlight-color: transparent;
}

button:active {
  transition: none;
}
.result::before {
  /* removed decorative gradient overlay */
}

/* .result.update removed */

.result strong {
  font-size: 20px;
  color: var(--subway-green-light);
}
/* iOS style switch */
input[type="checkbox"] {
  appearance: none;
  -webkit-appearance: none;
  width: 44px;
  height: 26px;
  background: #e5e5ea;
  border-radius: 999px;
  position: relative;
  outline: none;
  cursor: pointer;
  transition: background 0.2s ease;
}

input[type="checkbox"]::after {
  content: "";
  position: absolute;
  width: 22px;
  height: 22px;
  background: #fff;
  border-radius: 50%;
  top: 2px;
  left: 2px;
  transition: transform 0.2s ease;
  box-shadow: 0 1px 2px rgba(0,0,0,0.2);
}

input[type="checkbox"]:checked {
  background: #34c759;
}

input[type="checkbox"]:checked::after {
  transform: translateX(18px);
}

input[type="checkbox"]:active::after {
  transform: scale(1.05);
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
#addonList select {
  animation: fadeIn 0.2s ease;
}

#sauce2Container {
  opacity: 0;
  transform: translateY(-4px);
  transition: all 0.2s ease;
}
#sauce2Container.show {
  opacity: 1;
  transform: translateY(0);
}

/* Swipe hint styles */
#swipeHint {
  opacity: 0;
  transition: opacity 0.3s ease;
}

#addonList:not(:empty) ~ #addonEmpty #swipeHint,
#swipeHint.show {
  opacity: 1;
}

@media (prefers-color-scheme: dark) {
  body {
    background: #000;
    color: #fff;
  }

  .card {
    background: #1c1c1e;
    border: 1px solid #2c2c2e;
    box-shadow: none;
  }

  select {
    background: #2c2c2e;
    color: #fff;
    border: 1px solid #3a3a3c;
  }

  select:hover {
    background: #3a3a3c;
  }

  .result {
    background: #1c1c1e;
    border: 1px solid #2c2c2e;
    color: #fff;
  }

  label {
    color: #f2f2f7;
  }

  .logo .title-sub {
    color: #aaa;
  }

</style>
</head>

<body>

  <span class="sub">SUB</span><span class="way">WAY</span>
  <span class="title-sub"> 計算機</span>

<!-- 主餐 -->
<div class="card">
<div style="display:flex;justify-content:space-between;align-items:center;">

  <div style="margin-top:12px;display:flex;align-items:center;gap:10px;">

  <div id="sauce2List" style="min-height:10px;margin-top:8px;"></div>
</div>

<!-- spacer to prevent overlap -->
<div style="height:180px;"></div>

<!-- 結果 -->
<div class="result" id="result"></div>

function openAddonPicker(){
  const modal = document.getElementById("addonModal")
  const catEl = document.getElementById("addonModalCategories")
  const itemsEl = document.getElementById("addonItems")

  modal.style.display = "block"
  catEl.innerHTML = ""
  itemsEl.innerHTML = ""

  Object.keys(addonGroups).forEach((g,i)=>{
    const btn = document.createElement("button")
    btn.textContent = g
    btn.style.padding = "8px 12px"
    btn.style.borderRadius = "999px"
    btn.style.border = "1px solid #ddd"
    btn.style.background = i===0 ? "#34c759" : "#fff"
    btn.style.color = i===0 ? "#fff" : "#000"

    btn.onclick = ()=>{
      document.querySelectorAll("#addonModalCategories button").forEach(b=>{
        b.style.background="#fff"
        b.style.color="#000"
      })
      btn.style.background="#34c759"
      btn.style.color="#fff"
      renderAddonItems(g)
    }

    catEl.appendChild(btn)
  })

  renderAddonItems(Object.keys(addonGroups)[0])

  modal.onclick = (e)=>{
    if(e.target.id==="addonModal") modal.style.display="none"
  }
}

function renderAddonItems(group){
  const itemsEl = document.getElementById("addonItems")
  itemsEl.innerHTML = ""

  addonGroups[group].forEach(name=>{
    if(!data.addon[name]) return;

    const div = document.createElement("div")
    div.style.padding = "12px"
    div.style.borderBottom = "1px solid #eee"
    div.style.cursor = "pointer"

    const en = addonNameMap[name] || ""
    div.textContent = en ? `${name} ${en}` : name

    div.onclick = ()=>{
      addAddon(name)
      document.getElementById("addonModal").style.display="none"

      const last = document.querySelector("#addonList select:last-child")

      if(last){
        setTimeout(()=>{
          last.focus()
          last.click()
        }, 50)
      }
    }
    itemsEl.appendChild(div)
  })
}

function createAddonSelect(removable = true){
  const wrapper = document.createElement("div")
  // Touch swipe-to-remove for mobile
  let startX = 0;
  let startY = 0;
  let currentX = 0;
  let isSwiping = false;

  wrapper.addEventListener("touchstart", (e) => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    isSwiping = false;
  });

  wrapper.addEventListener("touchmove", (e) => {
    currentX = e.touches[0].clientX;
    const currentY = e.touches[0].clientY;

    const diffX = currentX - startX;
    const diffY = currentY - startY;

    // only trigger swipe if horizontal movement is dominant
    if (!isSwiping) {
      if (Math.abs(diffX) > 10 && Math.abs(diffX) > Math.abs(diffY)) {
        isSwiping = true;
      } else {
        return;
      }
    }

    e.preventDefault();

    if (diffX < 0) {
      wrapper.style.transform = `translateX(${diffX}px)`;
      wrapper.style.opacity = Math.max(0.5, 1 + diffX / 200);
    }
  });

  wrapper.addEventListener("touchend", (e) => {
    const diff = currentX - startX;

    if (!isSwiping) {
      startX = 0;
      currentX = 0;
      return;
    }

    if (diff < -80) {
      wrapper.style.transition = "all 0.2s ease";
      wrapper.style.transform = "translateX(-120%)";
      wrapper.style.opacity = "0";

      setTimeout(() => {
        wrapper.remove();
        updateAddonUI();
        calc();
      }, 200);
    } else {
      wrapper.style.transition = "all 0.2s ease";
      wrapper.style.transform = "translateX(0)";
      wrapper.style.opacity = "1";
    }

    isSwiping = false;
    startX = 0;
    currentX = 0;
  });

  wrapper.style.display = "flex"
  wrapper.style.alignItems = "center"
  wrapper.style.gap = "8px"
  wrapper.style.marginTop = "8px"
  wrapper.style.position = "relative"
  wrapper.style.overflow = "visible"

  const select = document.createElement("select")
  // prevent card click from immediately closing select
  select.addEventListener("click", (e) => {
    e.stopPropagation();
  });
  select.addEventListener("touchstart", (e) => {
    e.stopPropagation();
  });
  select.onchange = () => {
    calc()
  }
  select.style.flex = "1"
  select.style.position = "relative"
  select.style.zIndex = "1"

  select.innerHTML = '<option value="">選擇加料</option>'

  const groups = {
    "肉類": ["鮮嫩雞柳","嫩切雞肉(3片)","香烤雞肉","照燒雞肉","厚切嫩牛"],
    "其他": Object.keys(data.addon)
  }

  Object.entries(groups).forEach(([group, items])=>{
    const optgroup = document.createElement("optgroup")
    optgroup.label = group

    items.forEach(i=>{
      if(!data.addon[i]) return
      let en = addonNameMap[i] || ""
      const label = en ? `${i} ${en}` : i;
      const option = document.createElement("option")
      option.value = i
      option.textContent = label
      optgroup.appendChild(option)
    })

    select.appendChild(optgroup)
  })

  wrapper.appendChild(select)

  if(removable){
    const removeBtn = document.createElement("button")
    removeBtn.textContent = "−"
    removeBtn.style.border = "none"
    removeBtn.style.background = "#e5e5ea"
    removeBtn.style.borderRadius = "50%"
    removeBtn.style.width = "28px"
    removeBtn.style.height = "28px"
    removeBtn.style.display = "flex"
    removeBtn.style.alignItems = "center"
    removeBtn.style.justifyContent = "center"
    removeBtn.style.fontSize = "18px"
    removeBtn.style.cursor = "pointer"
    removeBtn.style.color = "#1c1c1e"
    removeBtn.style.transition = "all 0.15s ease"
    removeBtn.style.opacity = "0.6"

    removeBtn.onclick = (e) => {
      e.stopPropagation();
      wrapper.remove()
      updateAddonUI()
      calc()
    }

    wrapper.appendChild(removeBtn)
  }

  return wrapper
}

function addAddon(defaultValue = ""){
  haptic();
  const container = document.getElementById("addonList")

  // Always allow remove (first add-on is now removable)
  const wrapper = createAddonSelect(true)

  if (defaultValue) {
    wrapper.querySelector("select").value = defaultValue;
  }

  container.appendChild(wrapper)
  // only auto focus when user manually adds
  if (!defaultValue) {
    const select = wrapper.querySelector("select")
    setTimeout(()=>{
      select.focus()
      select.click()
    }, 50)
  }
  updateAddonUI();
}

function updateAddonUI(){
  const count = document.querySelectorAll("#addonList select").length
  const label = document.getElementById("addonLabel")
  const empty = document.getElementById("addonEmpty")
  label.textContent = `Add-ons (${count})`
  empty.style.display = count ? "none" : "block"

  // show swipe hint only when there are add-ons
  const hint = document.getElementById("swipeHint")
  if (hint) {
    hint.style.display = count ? "block" : "none"
  }
}

let lastCal = 0;
let lastProtein = 0;

function animateNumber(el, start, end, decimals=1, duration=300) {
  let startTime = null;
  function step(timestamp) {
    if (!startTime) startTime = timestamp;
    const progress = Math.min((timestamp - startTime) / duration, 1);
    const value = start + (end - start) * progress;
    el.textContent = value.toFixed(decimals);
    if (progress < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function calc(){
let total = {cal:0, protein:0}
let breakdown = []

let main = document.getElementById("main").value

if(main && data.main[main]){
  total.cal += data.main[main].cal
  total.protein += data.main[main].protein
  breakdown.push(`${main}: ${data.main[main].cal} kcal`)
}

if(document.getElementById("double").checked && main){
  if(data.addon[main]){
    total.cal += data.addon[main].cal
    total.protein += data.addon[main].protein
    breakdown.push(`雙份肉 ${main}: ${data.addon[main].cal} kcal`)
  }
}

const addonSelects = document.querySelectorAll("#addonList select")

addonSelects.forEach(sel=>{
  let name = sel.value
  if(name && data.addon[name]){
    total.cal += data.addon[name].cal
    total.protein += data.addon[name].protein
    breakdown.push(`${name}: ${data.addon[name].cal} kcal`)
  }
})

let sauce1 = document.getElementById("sauce1").value
const sauce2Select = document.querySelector("#sauce2List select")
let sauce2 = sauce2Select ? sauce2Select.value : ""
const sauce2Visible = !!sauce2Select

if(sauce1 && sauce2Visible && sauce2){
  // both sauces → each half
  total.cal += data.sauce[sauce1].cal / 2
  total.cal += data.sauce[sauce2].cal / 2
  breakdown.push(`${sauce1}: ${data.sauce[sauce1].cal / 2} kcal`)
  breakdown.push(`${sauce2}: ${data.sauce[sauce2].cal / 2} kcal`)
} else if(sauce1){
  total.cal += data.sauce[sauce1].cal
  breakdown.push(`${sauce1}: ${data.sauce[sauce1].cal} kcal`)
}

const resultEl = document.getElementById("result")

resultEl.innerHTML =
`<div style="font-size:20px;font-weight:600;">🔥 <span id="calVal">0.0</span> kcal</div>
<div style="font-size:26px;color:#34c759;font-weight:700;margin-top:6px;"><span id="proVal">0</span> g protein</div>
<div style="margin-top:10px;font-size:13px;color:#8e8e93;line-height:1.5;">
${breakdown.join("<br>")}
</div>`

const calEl = document.getElementById("calVal")
const proEl = document.getElementById("proVal")

const calDecimals = (Math.round(total.cal * 10) % 10 === 0) ? 0 : 1
animateNumber(calEl, lastCal, total.cal, calDecimals)
animateNumber(proEl, lastProtein, total.protein, 0)

lastCal = total.cal
lastProtein = total.protein

  // Ensure result is visible when calculated
  resultEl.style.visibility = "visible"
  resultEl.classList.add("active")
  setTimeout(() => resultEl.classList.remove("active"), 600)
  if (navigator.vibrate) navigator.vibrate(5);
  updateResultVisibility()
}

    resultEl.style.pointerEvents = "none"
