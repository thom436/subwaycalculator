<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Subway Calc</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🥪</text></svg>">

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont;
  background: #f2f2f7;
  margin: 0;
  padding: 20px;
  color: #000;
}

h2 {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 20px;
}

.card {
  background: white;
  border-radius: 18px;
  padding: 18px;
  margin-bottom: 16px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.06);
}

label {
  font-size: 15px;
  font-weight: 500;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

select {
  width: 100%;
  margin-top: 12px;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: #f2f2f7;
  font-size: 16px;
  appearance: none;
}

select:focus {
  outline: none;
  background: #e9e9ee;
}

select:disabled {
  opacity: 0.5;
}

.toggle {
  appearance: none;
  width: 40px;
  height: 24px;
  background: #d1d1d6;
  border-radius: 12px;
  position: relative;
  transition: 0.25s;
}

.toggle:checked {
  background: #34c759;
}

.toggle::after {
  content: "";
  width: 20px;
  height: 20px;
  background: white;
  border-radius: 50%;
  position: absolute;
  top: 2px;
  left: 2px;
  transition: 0.25s;
}

.toggle:checked::after {
  transform: translateX(16px);
}

.result {
  position: sticky;
  bottom: 0;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(12px);
  padding: 18px;
  border-radius: 18px;
  font-size: 18px;
  font-weight: 600;
  box-shadow: 0 -6px 20px rgba(0,0,0,0.08);
}

.result strong {
  font-size: 20px;
}
</style>
</head>

<body>

<h2>Subway 計算機</h2>

<!-- 主餐 -->
<div class="card">
<label>
  <span>口味</span>
  <span style="display:flex;align-items:center;gap:8px;">
    <span style="font-size:14px;color:#666;">雙倍肉</span>
    <input type="checkbox" id="double" class="toggle" onchange="calc()" checked>
  </span>
</label>
<select id="main" onchange="calc()"></select>
</div>

<!-- 加料 -->
<div class="card">
<label>
<span>加料</span>
<input type="checkbox" id="addonToggle" class="toggle" onchange="toggleAddon(this)" checked>
</label>
<select id="addon1" disabled onchange="calc()"></select>
<select id="addon2" disabled onchange="calc()"></select>
</div>

<!-- 醬料 -->
<div class="card">
<label>
<span>醬料（可選兩種，各半）</span>
<input type="checkbox" id="sauceToggle" class="toggle" onchange="toggleSauce(this)" checked>
</label>
<select id="sauce1" disabled onchange="calc()"></select>

<label style="margin-top:10px;">
  <span>第二種醬料</span>
  <input type="checkbox" id="sauce2Toggle" class="toggle" onchange="toggleSauce2(this)">
</label>
<select id="sauce2" disabled onchange="calc()"></select>
</div>

<!-- 結果 -->
<div class="result" id="result">
卡路里: 0 kcal<br>
蛋白質: 0 g
</div>

<script>

const data = {
main:{
"照燒雞肉":{cal:362,protein:27},
"厚切嫩牛":{cal:366,protein:26},
"鮮嫩雞柳":{cal:324,protein:25},
"香烤雞肉":{cal:331,protein:23},
"鮪魚":{cal:507,protein:22},
"義大利經典":{cal:409,protein:22},
"燒烤牛肉":{cal:346,protein:21},
"百味俱樂部":{cal:325,protein:21},
"義大利牛肉丸":{cal:383,protein:20},
"嫩切雞肉":{cal:300,protein:20},
"火腿":{cal:317,protein:19},
"哈燒起司總匯":{cal:321,protein:18},
"蛋沙拉":{cal:421,protein:17},
"墨西哥辣牛":{cal:320,protein:17},
"鷹嘴豆泥餅":{cal:425,protein:16},
"墨西哥手撕豬":{cal:321,protein:16},
"素食蔬菜":{cal:250,protein:10}
},

addon:{
"鮮嫩雞柳":{cal:74,protein:15},
"嫩切雞肉(3片)":{cal:50,protein:10},
"嫩切雞肉(1片)":{cal:17,protein:3},
"香烤雞肉":{cal:81,protein:13},
"照燒雞肉":{cal:112,protein:17},
"百味俱樂部":{cal:75,protein:10},
"厚切嫩牛":{cal:100,protein:13},
"燒烤牛肉(1片/19.5g)":{cal:32,protein:4},
"嫩煎蛋(1片)":{cal:41,protein:5},
"火腿(4片)":{cal:67,protein:8},
"火腿(1片)":{cal:17,protein:2},
"辣豆瓣嫩牛":{cal:157,protein:18},
"燒烤牛肉(3片/59g)":{cal:96,protein:11},
"哈燒起司總匯":{cal:71,protein:8},
"墨西哥辣牛":{cal:70,protein:7},
"培根(1條)":{cal:24,protein:2},
"墨西哥手撕豬":{cal:118,protein:9},
"義大利經典":{cal:159,protein:12},
"義大利牛肉丸":{cal:133,protein:10},
"切絲巧達起司":{cal:55,protein:3.3},
"英式切片起司(2片)":{cal:39,protein:2.3},
"義式辣香腸(1片)":{cal:18,protein:1},
"義式煙燻臘腸(1片)":{cal:20,protein:1},
"鮪魚":{cal:257,protein:12},
"酪梨泥(1球)":{cal:24,protein:1},
"蛋沙拉(1球)":{cal:86,protein:3.3},
"蛋沙拉(2球)":{cal:171,protein:6.5},
"鷹嘴豆泥餅(1顆)":{cal:58,protein:2},
"鷹嘴豆泥餅(3顆)":{cal:175,protein:6}
},

sauce:{
"千島醬":{cal:36.7},
"紅酒醋":{cal:0.3},
"美乃滋":{cal:100},
"甜蔥醬":{cal:33},
"鄉村醬":{cal:74},
"黃芥末":{cal:9},
"義大利油醋醬":{cal:14.8},
"蜂蜜芥末醬":{cal:21},
"墨西哥西南醬":{cal:66},
"橄欖油":{cal:44}
}
}

function init(){
let main = document.getElementById("main")
main.innerHTML = '<option value="">請選擇</option>'

let sortedMain = Object.entries(data.main)
  .map(([name, v]) => ({
    name,
    efficiency: v.protein / v.cal
  }))
  .sort((a, b) => b.efficiency - a.efficiency)

sortedMain.forEach(item=>{
  let label = ""
  if(item.efficiency > 0.075){
    label = "🔥 高蛋白效率"
  } else if(item.efficiency > 0.065){
    label = "⚡ 中等"
  } else {
    label = "・偏低"
  }

  main.innerHTML += `<option>${item.name}（${label}）</option>`
})

document.getElementById("main").selectedIndex = 1

let addon1 = document.getElementById("addon1")
let addon2 = document.getElementById("addon2")

addon1.innerHTML = '<option value="">選擇加料</option>'
addon2.innerHTML = '<option value="">選擇加料</option>'

Object.keys(data.addon).forEach(i=>{
  addon1.innerHTML += `<option>${i}</option>`
  addon2.innerHTML += `<option>${i}</option>`
})
document.getElementById("addon1").disabled = false
document.getElementById("addon2").disabled = false

let sauce1 = document.getElementById("sauce1")
let sauce2 = document.getElementById("sauce2")

sauce1.innerHTML = '<option value="">選擇醬料</option>'
sauce2.innerHTML = '<option value="">選擇醬料</option>'

Object.keys(data.sauce).forEach(i=>{
  sauce1.innerHTML += `<option>${i}</option>`
  sauce2.innerHTML += `<option>${i}</option>`
})

document.getElementById("sauce1").value = "橄欖油"

document.getElementById("sauce1").disabled = false
document.getElementById("sauce2").disabled = true

calc()
}

function toggleAddon(cb){
  document.getElementById("addon1").disabled = !cb.checked
  document.getElementById("addon2").disabled = !cb.checked
  calc()
}

function toggleSauce(cb){
  const enabled = cb.checked
  document.getElementById("sauce1").disabled = !enabled

  document.getElementById("sauce2Toggle").checked = false
  document.getElementById("sauce2").disabled = true

  calc()
}

function toggleSauce2(cb){
  document.getElementById("sauce2").disabled = !cb.checked
  calc()
}

function calc(){
let total = {cal:0, protein:0}

let mainRaw = document.getElementById("main").value
let main = mainRaw.split("（")[0]

if(main && data.main[main]){
  total.cal += data.main[main].cal
  total.protein += data.main[main].protein
}

if(document.getElementById("double").checked && main){
if(data.addon[main]){
total.cal += data.addon[main].cal
total.protein += data.addon[main].protein
}
}

let addonEnabled = document.getElementById("addonToggle").checked
let addon1 = document.getElementById("addon1").value
let addon2 = document.getElementById("addon2").value

if(addonEnabled){
  if(addon1){
    total.cal += data.addon[addon1].cal
    total.protein += data.addon[addon1].protein
  }
  if(addon2){
    total.cal += data.addon[addon2].cal
    total.protein += data.addon[addon2].protein
  }
}

let sauceEnabled = document.getElementById("sauceToggle").checked
let sauce1 = document.getElementById("sauce1").value
let sauce2Enabled = document.getElementById("sauce2Toggle").checked
let sauce2 = document.getElementById("sauce2").value

if(sauceEnabled){
  if(sauce1){
    total.cal += data.sauce[sauce1].cal / (sauce2Enabled ? 2 : 1)
  }
  if(sauce2Enabled && sauce2){
    total.cal += data.sauce[sauce2].cal / 2
  }
}

document.getElementById("result").innerHTML =
`🔥 ${total.cal} kcal<br><strong>${total.protein} g protein</strong>`
}

init()

</script>

</body>
</html>
