<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Subway calculator</title>

<link rel="icon" href="favicon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Subway Calc">
<link rel="apple-touch-icon" href="favicon.png">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=20260331-2">
</head>

<body>

<h2 class="logo">
  <span class="sub">SUB</span><span class="way">WAY</span>
  <span class="title-sub"> 計算機</span>
</h2>
<div class="top-actions">
  <button type="button" class="icon-symbol-btn" aria-label="搜尋 Search" title="搜尋 Search" onclick="openQuickSearch()">
    ⌕
  </button>
  <button type="button" class="reset-btn" aria-label="重設 Reset" title="重設 Reset" onclick="resetAll()">
    ↻
  </button>
</div>

<!-- 主餐 -->
<div class="card">
<div style="display:flex;justify-content:space-between;align-items:center;">
<div>
  <div>6吋潛艇堡</div>
  <div style="color:#8e8e93;font-size:13px;font-weight:400;">6" Sandwich</div>
</div>
  <div style="display:flex;align-items:center;gap:8px;">
    <span class="double-meat-label">雙份肉 Double meat</span>
    <input type="checkbox" id="double" onchange="calc()"
      onclick="event.stopPropagation()"
      ontouchstart="event.stopPropagation()">
  </div>
</div>
<div id="mainPickerRow" class="picker-row-with-minus" style="margin-top:12px;">
  <div id="mainPicker" class="picker-field picker-field--placeholder picker-field--plus" onclick="openMainPicker()">
    +
  </div>
  <button type="button" id="mainRemoveBtn" class="minus-btn" onclick="removeMain()" style="display:none;">
    −
  </button>
</div>
<select id="main" onchange="calc()" style="display:none;"></select>
</div>

<!-- 加料 -->
<div class="card">
<label style="flex-direction:column;align-items:flex-start;">
  <span>加料</span>
  <span id="addonLabel" style="color:#8e8e93;font-size:13px;font-weight:400;">Add-ons (0)</span>
</label>
<div id="addonList" style="min-height:10px;"></div>
<div id="addonEmptyPicker" class="picker-field picker-field--placeholder picker-field--plus" onclick="openAddonPicker(addonActiveGroup)" style="margin-top:12px;">
  +
</div>
<div id="addonSwipeHint" class="swipe-hint" style="display:none;">左滑可刪除 Swipe to delete</div>
</div>

<!-- 醬料 -->
<div class="card">
<label style="flex-direction:column;align-items:flex-start;">
  <span>醬料</span>
  <span style="color:#8e8e93;font-size:13px;font-weight:400;">Sauce</span>
</label>
<div id="sauce1Row" class="picker-row-with-minus" style="margin-top:12px;">
  <div id="sauce1Picker" class="picker-field picker-field-fill picker-field--placeholder picker-field--plus" onclick="openSauce1Picker()">
    +
  </div>
  <button type="button" id="sauce1RemoveBtn" class="minus-btn" onclick="removeSauce1()" style="display:none;">
    −
  </button>
</div>
<input type="hidden" id="sauce1" value="">
  <div id="sauce2EmptyPicker" class="picker-field picker-field--placeholder picker-field--plus" onclick="addSauce2()" style="margin-top:10px;display:none;">
    +
  </div>
  <div id="sauce2List" style="min-height:10px;margin-top:8px;"></div>
  <div id="sauceSwipeHint" class="swipe-hint" style="display:none;">左滑可刪除 Swipe to delete</div>
</div>

<div id="disclaimerDetail" class="footer-detail footer-detail-static">
  <p class="footer-line">*潛艇堡包含小麥麵包、21g 生菜、3片番茄、3片大黃瓜、3根青椒、7g 洋蔥、三角切片起司。</p>
  <p class="footer-line">⚠️ 本工具為非官方計算器，營養數據來源為 SUBWAY 官方營養資訊；實際餐點仍可能因門市與製作方式略有差異。</p>
  <p class="footer-links">
    <a href="https://subway.com.tw/GoWeb2/include/meals-nutrition.html" target="_blank" rel="noopener noreferrer" class="footer-inline-link">官方營養資訊</a>
    <span class="footer-link-sep">｜</span>
    <a href="https://subway.com.tw/GoWeb2/include/index.php?Page=1&Cate02=%E6%BD%9B%E8%89%87%E5%A0%A1" target="_blank" rel="noopener noreferrer" class="footer-inline-link">官方菜單</a>
  </p>
  <p class="footer-version">資料更新：2026-03-31</p>
</div>

<!-- spacer to prevent overlap -->
<div style="height:220px;"></div>

<!-- 結果 -->
<div class="result" id="result"></div>

<script src="app.js?v=20260331-2"></script>
<div id="addonModal" style="position:fixed;inset:0;background:rgba(0,0,0,0.4);display:none;z-index:10000;">
  <div style="position:absolute;left:0;right:0;bottom:0;background:#fff;border-top-left-radius:20px;border-top-right-radius:20px;padding:16px;height:70vh;display:flex;flex-direction:column;">
    <div id="addonCategoriesWrapper" style="flex:0 0 auto;background:#fff;padding-bottom:8px;">
      <div id="addonModalCategories" style="display:flex;gap:8px;overflow:auto;"></div>
    </div>
    <input id="addonSearch" class="modal-search-input" type="text" placeholder="搜尋加料 Search add-ons" autocomplete="off" oninput="renderAddonItems(addonActiveGroup)">
    <div id="addonItems" style="flex:1;overflow:auto;"></div>
  </div>
</div>
<div id="mainModal" style="position:fixed;inset:0;background:rgba(0,0,0,0.4);display:none;z-index:10000;">
  <div style="position:absolute;left:0;right:0;bottom:0;background:#fff;border-top-left-radius:20px;border-top-right-radius:20px;padding:16px;height:70vh;display:flex;flex-direction:column;">
    <div id="mainCategoriesWrapper" style="flex:0 0 auto;background:#fff;padding-bottom:8px;">
      <div id="mainModalCategories" style="display:flex;gap:8px;overflow:auto;"></div>
    </div>
    <input id="mainSearch" class="modal-search-input" type="text" placeholder="搜尋口味 Search flavor" autocomplete="off" oninput="renderMainItems(mainActiveGroup)">
    <div id="mainItems" style="flex:1;overflow:auto;"></div>
  </div>
</div>
<div id="sauceModal" style="position:fixed;inset:0;background:rgba(0,0,0,0.4);display:none;z-index:10000;">
  <div style="position:absolute;left:0;right:0;bottom:0;background:#fff;border-top-left-radius:20px;border-top-right-radius:20px;padding:16px;height:70vh;display:flex;flex-direction:column;">
    <div style="font-size:16px;font-weight:700;margin-bottom:8px;">選擇醬料</div>
    <div id="sauceItems" style="flex:1;overflow:auto;"></div>
  </div>
</div>
<div id="quickSearchModal" style="position:fixed;inset:0;background:rgba(0,0,0,0.4);display:none;z-index:10000;">
  <div style="position:absolute;left:0;right:0;bottom:0;background:#fff;border-top-left-radius:20px;border-top-right-radius:20px;padding:16px;height:70vh;display:flex;flex-direction:column;">
    <div style="font-size:16px;font-weight:700;margin-bottom:8px;">快速搜尋 Quick search</div>
    <input id="quickSearchInput" class="modal-search-input" type="text" placeholder="搜尋口味或加料 Search flavor or add-ons" autocomplete="off" oninput="renderQuickSearchItems()">
    <div id="quickSearchItems" style="flex:1;overflow:auto;"></div>
  </div>
</div>
</body>
</html>
